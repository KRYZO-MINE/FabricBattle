<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FabricBattle | Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="../index.html" class="brand">FabricBattle</a>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">Menu</button>
            <nav class="main-nav" id="mainNav">
                <a href="../index.html">Home</a>
                <a href="tournaments.html">Tournaments</a>
                <a href="leaderboard.html">Leaderboard</a>
                <a href="../contact/contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container" id="app">
        <section class="form-card">
            <h2>Login</h2>
            <p class="hero-text">Welcome back, Soldier! Enter your details to continue.</p>
            <form id="loginForm">
                <label>Email
                    <input type="email" name="email" required>
                </label>
                <label>Password
                    <input type="password" name="password" required>
                </label>
                <button type="submit" class="btn btn-primary">Login</button>
                <p style="margin-top: 10px; font-size: 0.9rem;">Don't have an account? <a href="signup.html" style="color: var(--brand);">Sign Up</a></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>Copyright <span id="year"></span> FabricBattle. All rights reserved.</p>
            <div class="footer-links">
                <a href="../policies/terms.html">Terms</a>
                <a href="../policies/privacy.html">Privacy</a>
                <a href="../policies/legal.html">Legal</a>
            </div>
        </div>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="../assets/js/script.js"></script>
</body>
</html>
